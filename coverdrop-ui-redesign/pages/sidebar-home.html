/*
 * Pinguo design tokens
 * Brand: Pinguo
 * Domain: Consumer imaging product
 * Style: Restrained, elegant, Apple-inspired
 * Theme mode: light-dark
 * Source language: zh
 * Output language: en
 *
 * Color architecture (two layers):
 *   1. Primitive palette - six categories. brand / background / text / icon
 *      are each a 10-step scale (50 lightest to 900 darkest). state-success and
 *      state-error are functional colors anchored on Apple system colors.
 *      Anchors follow Apple Human Interface Guidelines system colors
 *      (System Blue #007AFF, System Green #34C759, System Red #FF3B30,
 *      system grays / label / background colors).
 *   2. Semantic tokens - :root (light) and .dark map roles onto primitives.
 *      Components and UI kits must only consume the semantic tokens below.
 */

/* @group-priority: brand, background, text, icon, state-success, state-error */

:root {
  /* ===== PRIMITIVE PALETTE ===== */

  /* brand */
  --brand-50: #e8f2ff;
  --brand-100: #cfe5ff;
  --brand-200: #9fcbff;
  --brand-300: #66abff;
  --brand-400: #2e8dff;
  --brand-500: #007aff; /* @primary */
  --brand-600: #0064d6;
  --brand-700: #004fad;
  --brand-800: #003b82;
  --brand-900: #00275a;

  /* background */
  --background-50: #ffffff;
  --background-100: #f7f7fa;
  --background-200: #f2f2f7;
  --background-300: #e5e5ea;
  --background-400: #d1d1d6;
  --background-500: #aeaeb2;
  --background-600: #8e8e93;
  --background-700: #3a3a3c;
  --background-800: #1c1c1e;
  --background-900: #000000;

  /* text */
  --text-50: #f5f5f7;
  --text-100: #e3e3e8;
  --text-200: #c7c7cc;
  --text-300: #aeaeb2;
  --text-400: #8e8e93;
  --text-500: #6e6e73;
  --text-600: #48484a;
  --text-700: #3c3c43;
  --text-800: #1d1d1f;
  --text-900: #000000;

  /* icon */
  --icon-50: #f5f5f7;
  --icon-100: #e5e5ea;
  --icon-200: #d1d1d6;
  --icon-300: #c7c7cc;
  --icon-400: #aeaeb2;
  --icon-500: #8e8e93;
  --icon-600: #6e6e73;
  --icon-700: #48484a;
  --icon-800: #2c2c2e;
  --icon-900: #1d1d1f;

  /* state-success */
  --state-success: #34c759; /* @primary */
  --state-success-dark: #30d158;
  --state-success-surface: #e9f9ee;
  --state-success-foreground: #ffffff;

  /* state-error */
  --state-error: #ff3b30; /* @primary */
  --state-error-dark: #ff453a;
  --state-error-surface: #ffecea;
  --state-error-foreground: #ffffff;

  /* ===== SEMANTIC ROLES ===== */

  /* semantic */
  --background: var(--background-50);
  --foreground: var(--text-800);
  --card: var(--background-50);
  --card-foreground: var(--text-800);
  --popover: var(--background-50);
  --popover-foreground: var(--text-900);

  --primary: var(--brand-500);
  --primary-foreground: var(--background-50);
  --secondary: var(--background-200);
  --secondary-foreground: var(--text-800);
  --muted: var(--background-200);
  --muted-foreground: var(--text-400);
  --accent: var(--background-100);
  --accent-foreground: var(--text-800);
  --destructive: var(--state-error);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-300);
  --input: var(--background-400);
  --ring: var(--brand-500);

  --icon: var(--icon-900);
  --icon-muted: var(--icon-500);

  /* chart */
  --chart-1: var(--state-success);
  --chart-2: var(--brand-500);
  --chart-3: #ff9500;
  --chart-4: #5856d6;
  --chart-5: #af52de;

  /* sidebar */
  --sidebar: var(--background-200);
  --sidebar-foreground: var(--text-800);
  --sidebar-primary: var(--brand-500);
  --sidebar-primary-foreground: var(--background-50);
  --sidebar-accent: var(--background-300);
  --sidebar-accent-foreground: var(--text-800);
  --sidebar-border: var(--background-300);
  --sidebar-ring: var(--brand-500);

  /* TYPOGRAPHY */
  --font-sans: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-serif: DM Sans, ui-sans-serif, sans-serif, system-ui;
  --font-mono: JetBrains Mono, monospace;
  --tracking-normal: 0em;

  /* RADIUS */
  --radius: 1.2rem;

  /* SHADOWS */
  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.04); /* Hairline */
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.04); /* Subtle */
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05), 0 1px 3px -1px rgba(0, 0, 0, 0.05); /* Card */
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06), 0 1px 2px -1px rgba(0, 0, 0, 0.05); /* Raised */
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.06), 0 2px 4px -2px rgba(0, 0, 0, 0.05); /* Card Hover */
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.08), 0 4px 8px -4px rgba(0, 0, 0, 0.05); /* Float */
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.10), 0 8px 16px -8px rgba(0, 0, 0, 0.06); /* Overlay */
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.12); /* Modal */

  /* SPACING */
  --spacing: 0.24rem;
}

/* ===== SEMANTIC ROLES - dark (primitive palette inherited) ===== */
.dark {
  --background: var(--background-900);
  --foreground: var(--text-50);
  --card: var(--background-800);
  --card-foreground: var(--text-50);
  --popover: var(--background-700);
  --popover-foreground: var(--text-50);

  --primary: var(--brand-400);
  --primary-foreground: var(--background-900);
  --secondary: var(--background-800);
  --secondary-foreground: var(--text-50);
  --muted: var(--background-800);
  --muted-foreground: var(--text-400);
  --accent: var(--background-700);
  --accent-foreground: var(--text-50);
  --destructive: var(--state-error-dark);
  --destructive-foreground: var(--state-error-foreground);
  --success: var(--state-success-dark);
  --success-foreground: var(--state-success-foreground);
  --border: var(--background-700);
  --input: var(--background-700);
  --ring: var(--brand-400);

  --icon: var(--icon-50);
  --icon-muted: var(--icon-500);

  --chart-1: var(--state-success-dark);
  --chart-2: var(--brand-400);
  --chart-3: #ff9f0a;
  --chart-4: #5e5ce6;
  --chart-5: #bf5af2;

  --sidebar: var(--background-800);
  --sidebar-foreground: var(--text-50);
  --sidebar-primary: var(--brand-400);
  --sidebar-primary-foreground: var(--background-900);
  --sidebar-accent: var(--background-700);
  --sidebar-accent-foreground: var(--text-50);
  --sidebar-border: var(--background-700);
  --sidebar-ring: var(--brand-400);

  --shadow-2xs: 0 1px 2px -1px rgba(0, 0, 0, 0.30);
  --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.30);
  --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.36), 0 1px 3px -1px rgba(0, 0, 0, 0.36);
  --shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.40), 0 1px 2px -1px rgba(0, 0, 0, 0.36);
  --shadow-md: 0 4px 8px -2px rgba(0, 0, 0, 0.44), 0 2px 4px -2px rgba(0, 0, 0, 0.36);
  --shadow-lg: 0 8px 24px -8px rgba(0, 0, 0, 0.50), 0 4px 8px -4px rgba(0, 0, 0, 0.40);
  --shadow-xl: 0 16px 40px -10px rgba(0, 0, 0, 0.55), 0 8px 16px -8px rgba(0, 0, 0, 0.44);
  --shadow-2xl: 0 24px 64px -12px rgba(0, 0, 0, 0.60);
}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:calc(var(--spacing)*1.5);height:40px;padding:0 20px;border:none;border-radius:calc(var(--radius)*2);background:transparent;color:var(--foreground);font:600 14px/1 var(--font-sans);letter-spacing:var(--tracking-normal);white-space:nowrap;box-shadow:var(--shadow-sm);cursor:pointer;transition:background-color .18s ease,color .18s ease,opacity .18s ease,filter .18s ease}

.btn:disabled{opacity:.42;cursor:not-allowed}
.btn-primary{background:var(--primary);color:var(--primary-foreground)}
.btn-primary:hover{filter:brightness(.96)}
.btn-secondary{height:48px;padding:0 24px;background:var(--secondary);color:var(--secondary-foreground)}
.btn-secondary:hover{background:var(--muted)}
.btn-text{height:48px;padding:0 4px;box-shadow:none}

.t{display:grid;grid-template-columns:96px repeat(3,1fr);overflow:hidden;border:1px solid var(--border);border-radius:var(--radius);background:var(--card);color:var(--card-foreground);box-shadow:var(--shadow-sm)}

                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 9V12.5C2 13.0523 2.44772 13.5 3 13.5H13C13.5523 13.5 14 13.0523 14 12.5V9"/>
                    <polyline points="5 6 8 3 11 6"/>
                    <line x1="8" y1="3" x2="8" y2="9"/>
                  </svg>
                  扫描音乐库
                </button>
                <button class="btn-secondary-action">
                  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="7" cy="7" r="5"/>
                    <polyline points="7 4 7 7 9 8"/>
                  </svg>
                  加载最近扫描结果
                </button>
                <button class="btn-danger-text">
                  <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="1 4 7 4 13 4"/>
                    <path d="M3 4V12C3 12.5523 3.44772 13 4 13H10C10.5523 13 11 12.5523 11 12V4"/>
                    <path d="M5 4V2.5C5 2.22386 5.22386 2 5.5 2H8.5C8.77614 2 9 2.22386 9 2.5V4"/>
                  </svg>
                  移除
                </button>
              </div>

              <!-- Info footer -->
              <div class="info-footer">
                <div class="info-footer-text">扫描会读取音频标签，但不会修改音乐文件。</div>
                <div class="info-footer-snapshot">最近快照：scan-2026-06-26.json</div>
              </div>
            </div>

            <!-- Drag target overlay (corner hint) -->
            <div class="drag-overlay">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <span class="drag-overlay-text">拖入音乐文件夹</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        -webkit-mask-size: contain;
        mask-size: contain;
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        background-color: currentColor;
      }

      /* CoverDrop specific styles */
      * { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* Shadow tokens */
        --shadow-window: 0 24px 64px -12px rgba(0, 0, 0, 0.18), 0 8px 16px -8px rgba(0, 0, 0, 0.06);
        --shadow-window-border: rgba(0, 0, 0, 0.08);
        --shadow-traffic-inset: rgba(0, 0, 0, 0.12);
        --shadow-thumb: 0 1px 2px rgba(0, 0, 0, 0.08);
        --shadow-brand-btn: 0 1px 3px rgba(0, 122, 255, 0.3);
        --shadow-brand-btn-hover: 0 2px 6px rgba(0, 122, 255, 0.4);
        --shadow-hover-overlay: rgba(0, 0, 0, 0.04);
        --shadow-brand-subtle: rgba(0, 122, 255, 0.04);
        --shadow-drag-bg: rgba(255, 255, 255, 0.6);

        /* Titlebar gradient */
        --chrome-top: #fafafa;
        --chrome-bottom: #f5f5f5;

        /* Album art gradient tokens */
        --art-thumb-1a: #667eea;
        --art-thumb-1b: #764ba2;
        --art-thumb-2a: #f093fb;
        --art-thumb-2b: #f5576c;
      }

      body {
        font-family: DM Sans, ui-sans-serif, -apple-system, BlinkMacSystemFont, sans-serif, system-ui;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
        height: 100vh;
        width: 100vw;
      }

      /* macOS window container */
      .window {
        display: flex;
        flex-direction: column;
        width: 960px;
        height: 640px;
        margin: 40px auto;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--shadow-window);
        border: 1px solid var(--shadow-window-border);
      }

      /* macOS title bar */
      .titlebar {
        display: flex;
        align-items: center;
        height: 52px;
        padding: 0 16px;
        background: linear-gradient(180deg, var(--chrome-top) 0%, var(--chrome-bottom) 100%);
        border-bottom: 1px solid var(--background-300);
        flex-shrink: 0;
      }

      .traffic-lights {
        display: flex;
        gap: 8px;
        padding-top: 2px;
      }

      .traffic-light {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: inset 0 0 0 0.5px var(--shadow-traffic-inset);
      }

      .traffic-light.red { background: var(--state-error); }
      .traffic-light.yellow { background: var(--state-warning); }
      .traffic-light.green { background: var(--state-success); }

      .titlebar-title {
        flex: 1;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-800);
        margin-right: 60px; /* offset traffic lights */
      }

      /* Content wrapper */
      .content-wrapper {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* Sidebar */
      .sidebar {
        width: 240px;
        min-width: 240px;
        background: var(--background-200);
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--background-300);
      }

      .sidebar-brand {
        padding: 16px 16px 12px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sidebar-brand-icon {
        width: 28px;
        height: 28px;
        color: var(--brand-500);
        flex-shrink: 0;
      }

      .sidebar-brand-name {
        font-size: 15px;
        font-weight: 700;
        color: var(--text-800);
        letter-spacing: -0.01em;
      }

      .sidebar-divider {
        height: 1px;
        background: var(--background-400);
        margin: 0 16px 8px 16px;
        opacity: 0.5;
      }

      .sidebar-section-label {
        padding: 8px 20px 4px 20px;
        font-size: 11px;
        font-weight: 600;
        color: var(--text-400);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .sidebar-list {
        flex: 1;
        overflow-y: auto;
        padding: 0 8px;
      }

      .sidebar-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.15s ease;
        margin-bottom: 2px;
      }

      .sidebar-item:hover {
        background: var(--shadow-hover-overlay);
      }

      .sidebar-item.active {
        background: var(--shadow-brand-subtle);
      }

      .sidebar-item.active .sidebar-item-name {
        color: var(--brand-500);
      }

      .sidebar-thumb {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        flex-shrink: 0;
        box-shadow: var(--shadow-thumb);
      }

      .sidebar-thumb-1 {
        background: linear-gradient(135deg, var(--art-thumb-1a) 0%, var(--art-thumb-1b) 100%);
      }

      .sidebar-thumb-2 {
        background: linear-gradient(135deg, var(--art-thumb-2a) 0%, var(--art-thumb-2b) 100%);
      }

      .sidebar-item-info {
        flex: 1;
        min-width: 0;
      }

      .sidebar-item-name {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-800);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.2;
      }

      .sidebar-item-path {
        font-size: 11px;
        color: var(--text-400);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
        margin-top: 1px;
      }

      .sidebar-bottom {
        padding: 8px;
        border-top: 1px solid var(--background-400);
      }

      .sidebar-add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        width: 100%;
        height: 36px;
        border-radius: 8px;
        border: 1px dashed var(--background-500);
        background: transparent;
        color: var(--text-500);
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .sidebar-add-btn:hover {
        border-color: var(--brand-500);
        color: var(--brand-500);
        background: var(--shadow-brand-subtle);
      }

      .sidebar-add-btn svg {
        width: 14px;
        height: 14px;
      }

      /* Main content area */
      .main-content {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--background-50);
        position: relative;
        overflow: hidden;
      }

      .main-inner {
        max-width: 520px;
        width: 100%;
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .main-icon {
        width: 52px;
        height: 52px;
        color: var(--text-400);
        margin-bottom: 16px;
      }

      .main-title {
        font-size: 28px;
        font-weight: 700;
        color: var(--text-800);
        letter-spacing: -0.02em;
        margin-bottom: 24px;
      }

      /* Info cards */
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 100%;
        margin-bottom: 28px;
      }

      .info-card {
        padding: 14px 16px;
        border-radius: 14px;
        background: var(--background-100);
        border: 1px solid var(--background-300);
      }

      .info-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-400);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 6px;
      }

      .info-value {
        font-size: 14px;
        font-weight: 500;
        color: var(--text-800);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .info-value.path {
        font-family: 'JetBrains Mono', monospace;
        font-size: 12px;
        color: var(--text-600);
      }

      /* Action buttons */
      .action-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .btn-primary-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 40px;
        padding: 0 24px;
        border-radius: 999px;
        border: none;
        background: var(--brand-500);
        color: var(--primary-foreground);
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        box-shadow: var(--shadow-brand-btn);
        transition: all 0.15s ease;
      }

      .btn-primary-action:hover {
        background: var(--brand-600);
        box-shadow: var(--shadow-brand-btn-hover);
      }

      .btn-primary-action svg {
        width: 16px;
        height: 16px;
      }

      .btn-secondary-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        height: 40px;
        padding: 0 20px;
        border-radius: 999px;
        border: 1px solid var(--background-400);
        background: transparent;
        color: var(--text-800);
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-secondary-action:hover {
        border-color: var(--brand-500);
        color: var(--brand-500);
        background: var(--shadow-brand-subtle);
      }

      .btn-secondary-action svg {
        width: 14px;
        height: 14px;
      }

      .btn-danger-text {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 10px;
        border: none;
        background: transparent;
        color: var(--state-error);
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        border-radius: 6px;
        transition: background 0.15s ease;
      }

      .btn-danger-text:hover {
        background: var(--state-error-surface);
      }

      .btn-danger-text svg {
        width: 14px;
        height: 14px;
      }

      /* Info footer text */
      .info-footer {
        text-align: center;
      }

      .info-footer-text {
        font-size: 12px;
        color: var(--text-400);
        line-height: 1.6;
      }

      .info-footer-snapshot {
        font-size: 11px;
        color: var(--text-400);
        margin-top: 2px;
        font-family: 'JetBrains Mono', monospace;
      }

      /* Drag target overlay */
      .drag-overlay {
        position: absolute;
        bottom: 20px;
        right: 20px;
        width: 200px;
        height: 120px;
        border: 2px dashed var(--background-500);
        border-radius: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        opacity: 0.5;
        background: var(--shadow-drag-bg);
        backdrop-filter: blur(4px);
      }

      .drag-overlay svg {
        width: 24px;
        height: 24px;
        color: var(--text-400);
      }

      .drag-overlay-text {
        font-size: 12px;
        color: var(--text-400);
        font-weight: 500;
      }
    </style>
</body>
</html>
